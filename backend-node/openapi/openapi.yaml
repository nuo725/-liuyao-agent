          description: 报名成功（幂等）
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          status:
                            type: string
                            enum: [pending, approved, waitlist]

  /activities/{id}/join-status:
    get:
      tags: [activities]
      summary: 获取报名状态
      operationId: getJoinStatus
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 报名状态
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          status:
                            type: string
                            enum: [none, pending, approved, waitlist, rejected]

  # ─────────────── Share ───────────────
  /share/card/render:
    post:
      tags: [share]
      summary: 渲染分享卡图片
      operationId: renderShareCard
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [cardId]
              properties:
                cardId:
                  type: string
                theme:
                  type: string
                  enum: [warm, cool, dark]
                  default: warm
                text:
                  type: string
                backgroundImageUrl:
                  type: string
      responses:
        '200':
          description: 渲染结果
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          imageUrl:
                            type: string
                          width:
                            type: integer
                          height:
                            type: integer
                          format:
                            type: string
                            enum: [svg]
                          card:
                            type: object

  /share/card/save:
    post:
      tags: [share]
      summary: 保存分享卡草稿
      operationId: saveShareCard
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [cardId]
              properties:
                cardId:
                  type: string
                theme:
                  type: string
                  enum: [warm, cool, dark]
                text:
                  type: string
                backgroundImageUrl:
                  type: string
      responses:
        '200':
          description: 草稿已保存
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /share/community/publish:
    post:
      tags: [share]
      summary: 发布分享卡到社区
      operationId: publishShareCard
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [cardId]
              properties:
                cardId:
                  type: string
                shareText:
                  type: string
      responses:
        '200':
          description: 已发布
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          postId:
                            type: string

  /share/external:
    post:
      tags: [share]
      summary: 生成外部分享载荷
      operationId: externalShare
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [cardId]
              properties:
                cardId:
                  type: string
                platform:
                  type: string
                  enum: [wechat, moments, generic]
                  default: generic
      responses:
        '200':
          description: 分享载荷
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          title:
                            type: string
                          summary:
                            type: string
                          link:
                            type: string
                          imageUrl:
                            type: string

  # ─────────────── Analytics ───────────────
  /analytics/events:
    post:
      tags: [analytics]
      summary: 上报产品埋点事件
      operationId: ingestAnalyticsEvent
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [eventName]
              properties:
                eventName:
                  type: string
                  maxLength: 80
                payload:
                  type: object
                client:
                  type: object
                occurredAt:
                  type: string
                  format: date-time
      responses:
        '200':
          description: 事件已接收
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /analytics/wmru:
    get:
      tags: [analytics]
      summary: 获取周活跃仪式用户指标
      operationId: getWmru
      security:
        - bearerAuth: []
      parameters:
        - name: weekKey
          in: query
          schema:
            type: string
            pattern: '^\d{4}-W\d{2}$'
      responses:
        '200':
          description: WMRU 指标
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /analytics/wmru/recalculate:
    post:
      tags: [analytics]
      summary: 重算周活跃仪式用户指标
      operationId: recalculateWmru
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                weekKey:
                  type: string
                  pattern: '^\d{4}-W\d{2}$'
      responses:
        '200':
          description: WMRU 已重算
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /analytics/safety:
    get:
      tags: [analytics]
      summary: 获取安全与审核指标
      operationId: getSafetyMetrics
      security:
        - bearerAuth: []
      parameters:
        - name: weekKey
          in: query
          schema:
            type: string
            pattern: '^\d{4}-W\d{2}$'
      responses:
        '200':
          description: 安全指标
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  # ─────────────── Support ───────────────
  /support/feedback:
    post:
      tags: [support]
      summary: 提交反馈
      operationId: submitFeedback
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [category, content]
              properties:
                category:
                  type: string
                  enum: [bug, suggestion, abuse, other]
                content:
                  type: string
                  maxLength: 2000
                contact:
                  type: string
                client:
                  type: object
                  properties:
                    platform:
                      type: string
                      enum: [android, ios]
                    version:
                      type: string
      responses:
        '200':
          description: 反馈已提交
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          ticketId:
                            type: string

  # ─────────────── Media ───────────────
  /media/upload:
    post:
      tags: [media]
      summary: 上传媒体文件
      operationId: uploadMedia
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                purpose:
                  type: string
                  enum: [avatar, cover, post, share]
                  default: post
      responses:
        '200':
          description: 上传成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          url:
                            type: string
                          width:
                            type: integer
                          height:
                            type: integer
                          mime:
                            type: string
                          size:
                            type: integer

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: pageSize
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 50
        default: 20
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      schema:
        type: string
        format: uuid
    DeviceId:
      name: X-Device-Id
      in: header
      schema:
        type: string

  schemas:
    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object

    FailResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
        requestId:
          type: string

    HealthResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            status:
              type: string
              example: ok
            db:
              type: string
              example: connected
            time:
              type: string
              format: date-time

    UserProfile:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
        bio:
          type: string
        avatarUrl:
          type: string
        coverUrl:
          type: string
        shortId:
          type: string
        city:
          type: string
        gender:
          type: string
          enum: [male, female, not_disclosed]
        birthday:
          type: string
          format: date
        createdAt:
          type: string
          format: date-time

    ProfileSettings:
      type: object
      properties:
        pushEnabled:
          type: boolean
        vibrationEnabled:
          type: boolean
        ambientSoundEnabled:
          type: boolean
        publicProfile:
          type: boolean

    LoginResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/UserProfile'
        accessToken:
          type: string
        refreshToken:
          type: string
        expiresAt:
          type: string
          format: date-time
        refreshExpiresAt:
          type: string
          format: date-time

    CreditAccount:
      type: object
      properties:
        userId:
          type: string
        castBalance:
          type: integer
        followupBalance:
          type: integer
        isVip:
          type: boolean
        vipExpiresAt:
          type: string
          format: date-time
        lastResetDate:
          type: string
          format: date
        lastCheckinDate:
          type: string
          format: date

    BillingPlan:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        days:
          type: integer
        priceCents:
          type: integer
        currency:
          type: string

    Order:
      type: object
      properties:
        orderId:
          type: string
        planId:
          type: string
        status:
          type: string
          enum: [created, paying, paid, failed, refunded]
        amount:
          type: integer
        createdAt:
          type: string
          format: date-time

    RitualPerformRequest:
      type: object
      required: [question, tag, lines, movingLines]
      properties:
        question:
          type: string
          maxLength: 500
        tag:
          type: string
          enum: [relationship, career, emotion, choice, other]
        lines:
          type: array
          items:
            type: integer
            enum: [0, 1]
          minItems: 6
          maxItems: 6
        movingLines:
          type: array
          items:
            type: integer
            minimum: 0
            maximum: 5

    RitualSessionResponse:
      type: object
      properties:
        sessionId:
          type: string
        question:
          type: string
        tag:
          type: string
        pattern:
          type: object
          properties:
            lines:
              type: array
              items:
                type: integer
            movingLines:
              type: array
              items:
                type: integer
        status:
          type: string
        card:
          $ref: '#/components/schemas/InterpretationCard'
        createdAt:
          type: string
          format: date-time

    InterpretationCard:
      type: object
      properties:
        summary:
          type: string
        body:
          type: string
        followupDirections:
          type: array
          items:
            type: string
        needsClarification:
          type: boolean
        microActions:
          type: array
          items:
            type: string
        focusPoints:
          type: array
          items:
            type: string
        afterglow:
          type: string

    FollowupMessage:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum: [question, answer]
        content:
          type: string
        suggestedDirections:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time

    FeedItem:
      type: object
      properties:
        id:
          type: string
        cardId:
          type: string
          nullable: true
        shareText:
          type: string
        coverImageUrl:
          type: string
          nullable: true
        authorId:
          type: string
        authorUsername:
          type: string
        authorHandle:
          type: string
          nullable: true
        authorAvatarUrl:
          type: string
        createdAt:
          type: string
          format: date-time
        status:
          type: string
        metrics:
          type: object
          properties:
            likes:
              type: integer
            favorites:
              type: integer
            views:
              type: integer
            comments:
              type: integer
        viewerState:
          type: object
          properties:
            liked:
              type: boolean
            favorited:
              type: boolean
            followedAuthor:
              type: boolean

    Comment:
      type: object
      properties:
        id:
          type: string
        postId:
          type: string
        authorId:
          type: string
        authorUsername:
          type: string
        authorAvatarUrl:
          type: string
        parentId:
          type: string
          nullable: true
        text:
          type: string
        createdAt:
          type: string
          format: date-time

    AuthorProfile:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
        bio:
          type: string
        avatarUrl:
          type: string
        handle:
          type: string
        postCount:
          type: integer
        followerCount:
          type: integer
        followingCount:
          type: integer
        viewerState:
          type: object
          properties:
            followed:
              type: boolean
            blocked:
              type: boolean

    Notification:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum: [system, interaction, activity, agent]
        title:
          type: string
        body:
          type: string
        data:
          type: object
          properties:
            targetId:
              type: string
            targetType:
              type: string
        createdAt:
          type: string
          format: date-time
        read:
          type: boolean

    Activity:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        imageUrl:
          type: string
        status:
          type: string
          enum: [registering, ongoing, ended]
        startAt:
          type: string
          format: date-time
        endAt:
          type: string
          format: date-time
        capacity:
          type: integer
        participantCount:
          type: integer
        joinStatus:
          type: string
          enum: [none, pending, approved, waitlist, rejected]

    CheckinCalendar:
      type: object
      properties:
        month:
          type: string
          example: '2026-06'
        checkedDays:
          type: array
          items:
            type: integer
        streak:
          type: integer
        hasCheckedInToday:
          type: boolean

    PaginatedList:
      type: object
      properties:
        data:
          type: object
          properties:
            items:
              type: array
              items:
                type: object
            hasMore:
              type: boolean
            nextPage:
              type: integer
