openapi: 3.1.0
info:
  title: 宽窄·Orbit 业务后端 API
  description: |
    宽窄·Orbit 社区型 APP 业务后端 API 契约。

    ## 认证
    使用 Bearer Token 方式：`Authorization: Bearer <access_token>`

    ## 统一响应格式
    ```json
    { "success": true, "data": { ... } }
    ```
    错误时：
    ```json
    { "success": false, "error": { "code": "40001", "message": "..." }, "requestId": "req_xxx" }
    ```

    ## 错误码
    | Code | 含义 |
    |------|------|
    | 40001 | 请求参数错误 |
    | 40101 | 未登录或 Token 失效 |
    | 40301 | 无权限或被限制 |
    | 40401 | 资源不存在 |
    | 40901 | 状态冲突 / 重复操作 / 额度不足 |
    | 42901 | 请求频率过高 |
    | 50000 | 服务内部错误 |
    | 50401 | 上游超时 |

    ## 幂等
    写操作推荐携带 `Idempotency-Key` 请求头（UUID），相同 Key 的重复请求返回相同结果。

    ## 分页
    使用 page-based 分页：`?page=1&pageSize=20`，响应包含 `hasMore` 和 `nextPage`。
  version: 1.0.0
  contact:
    name: 宽窄·Orbit Backend Team

servers:
  - url: http://localhost:3000/api/v1
    description: Local development
  - url: https://api.kuanzhai-orbit.com/api/v1
    description: Production

tags:
  - name: health
    description: 健康检查
  - name: auth
    description: 认证与会话
  - name: profile
    description: 个人中心
  - name: credits
    description: 额度管理
  - name: billing
    description: 会员与订单
  - name: ritual
    description: 仪式会话与解读
  - name: community
    description: 社区内容与互动
  - name: notifications
    description: 通知与消息中心
  - name: match
    description: 同频与匹配
  - name: activities
    description: 活动
  - name: share
    description: 分享卡
  - name: analytics
    description: 产品指标与安全运营指标
  - name: support
    description: 帮助与反馈
  - name: media
    description: 媒体上传

paths:
  # ─────────────── Health ───────────────
  /health:
    get:
      tags: [health]
      summary: 健康检查
      operationId: getHealth
      responses:
        '200':
          description: 服务正常
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  # ─────────────── Auth ───────────────
  /auth/phone/send-code:
    post:
      tags: [auth]
      summary: 发送短信验证码
      operationId: sendPhoneCode
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone]
              properties:
                phone:
                  type: string
                  pattern: '^1[3-9]\d{9}$'
                  example: '13800000000'
      responses:
        '200':
          description: 验证码已发送
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /auth/phone/login:
    post:
      tags: [auth]
      summary: 手机验证码登录
      operationId: phoneLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone, code]
              properties:
                phone:
                  type: string
                code:
                  type: string
                  example: '123456'
                agreementVersion:
                  type: string
                privacyVersion:
                  type: string
                consentedAt:
                  type: string
                  format: date-time
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/LoginResponse'

  /auth/social/login:
    post:
      tags: [auth]
      summary: 社交登录（微信/QQ）
      operationId: socialLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [provider, authCode]
              properties:
                provider:
                  type: string
                  enum: [wechat, qq]
                authCode:
                  type: string
                agreementVersion:
                  type: string
                privacyVersion:
                  type: string
                consentedAt:
                  type: string
                  format: date-time
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/LoginResponse'

  /auth/session:
    get:
      tags: [auth]
      summary: 恢复会话
      operationId: restoreSession
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 会话信息
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          user:
                            $ref: '#/components/schemas/UserProfile'
                          accessToken:
                            type: string
                          expiresAt:
                            type: string
                            format: date-time

  /auth/logout:
    post:
      tags: [auth]
      summary: 登出
      operationId: logout
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 登出成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /auth/guest/upgrade:
    post:
      tags: [auth]
      summary: 游客账号升级
      operationId: upgradeGuest
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone, code]
              properties:
                phone:
                  type: string
                code:
                  type: string
      responses:
        '200':
          description: 升级成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/LoginResponse'

  /auth/password/recovery:
    post:
      tags: [auth]
      summary: 密码找回
      operationId: passwordRecovery
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone, code, newPassword, confirmPassword]
              properties:
                phone:
                  type: string
                code:
                  type: string
                newPassword:
                  type: string
                  minLength: 8
                confirmPassword:
                  type: string
      responses:
        '200':
          description: 密码已重置
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  # ─────────────── Profile ───────────────
  /profile/me:
    get:
      tags: [profile]
      summary: 获取个人资料
      operationId: getMyProfile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 个人资料
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/UserProfile'
    put:
      tags: [profile]
      summary: 更新个人资料
      operationId: updateMyProfile
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                  maxLength: 20
                bio:
                  type: string
                  maxLength: 200
                city:
                  type: string
                gender:
                  type: string
                  enum: [male, female, not_disclosed]
                birthday:
                  type: string
                  format: date
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/UserProfile'
    delete:
      tags: [profile]
      summary: 注销账号
      operationId: deleteAccount
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [confirmText]
              properties:
                confirmText:
                  type: string
                  description: 必须输入"注销"确认
      responses:
        '200':
          description: 注销申请已提交
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          coolingOffDays:
                            type: integer
                            example: 7

  /profile/me/settings:
    get:
      tags: [profile]
      summary: 获取设置
      operationId: getMySettings
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 设置信息
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ProfileSettings'
    put:
      tags: [profile]
      summary: 更新设置
      operationId: updateMySettings
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProfileSettings'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ProfileSettings'

  /profile/me/checkin:
    post:
      tags: [profile]
      summary: 每日签到
      operationId: checkin
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 签到成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          streak:
                            type: integer
                          reward:
                            type: integer

  /profile/me/checkin-calendar:
    get:
      tags: [profile]
      summary: 签到日历
      operationId: getCheckinCalendar
      security:
        - bearerAuth: []
      parameters:
        - name: month
          in: query
          schema:
            type: string
            pattern: '^\d{4}-\d{2}$'
          example: '2026-06'
      responses:
        '200':
          description: 签到日历
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/CheckinCalendar'

  /profile/me/interactions:
    get:
      tags: [profile]
      summary: 互动记录
      operationId: getInteractions
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: 互动记录列表
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - $ref: '#/components/schemas/PaginatedList'

  /profile/me/browse:
    get:
      tags: [profile]
      summary: 浏览记录
      operationId: getBrowseHistory
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: 浏览记录列表
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - $ref: '#/components/schemas/PaginatedList'

  # ─────────────── Credits ───────────────
  /credit/account:
    get:
      tags: [credits]
      summary: 获取额度账户
      operationId: getCreditAccount
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 额度账户信息
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/CreditAccount'

  /credit/consume:
    post:
      tags: [credits]
      summary: 消费额度
      operationId: consumeCredit
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type]
              properties:
                type:
                  type: string
                  enum: [cast, followup]
                amount:
                  type: integer
                  default: 1
                sessionId:
                  type: string
      responses:
        '200':
          description: 消费成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/CreditAccount'

  /credit/reset:
    post:
      tags: [credits]
      summary: 重置每日额度
      operationId: resetCredits
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 重置成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/CreditAccount'

  # ─────────────── Billing ───────────────
  /billing/plans:
    get:
      tags: [billing]
      summary: 获取会员计划列表
      operationId: getBillingPlans
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 计划列表
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          plans:
                            type: array
                            items:
                              $ref: '#/components/schemas/BillingPlan'

  /billing/order/create:
    post:
      tags: [billing]
      summary: 创建订单
      operationId: createOrder
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [planId]
              properties:
                planId:
                  type: string
      responses:
        '200':
          description: 订单已创建
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Order'

  /billing/order/confirm:
    post:
      tags: [billing]
      summary: 确认支付
      operationId: confirmPayment
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [orderId]
              properties:
                orderId:
                  type: string
                providerOrderId:
                  type: string
      responses:
        '200':
          description: 支付确认成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Order'

  /billing/order/{orderId}:
    get:
      tags: [billing]
      summary: 查询订单状态
      operationId: getOrder
      security:
        - bearerAuth: []
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 订单信息
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Order'

  # ─────────────── Ritual ───────────────
  /ritual/perform:
    post:
      tags: [ritual]
      summary: 创建仪式会话（起卦）
      operationId: performRitual
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RitualPerformRequest'
      responses:
        '200':
          description: 仪式会话已创建
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/RitualSessionResponse'

  /ritual/session/{sessionId}:
    get:
      tags: [ritual]
      summary: 恢复仪式会话
      operationId: getRitualSession
      security:
        - bearerAuth: []
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 会话详情
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/RitualSessionResponse'

  /ritual/session/{sessionId}/preview:
    get:
      tags: [ritual]
      summary: 获取解读预览（首次体验）
      operationId: getRitualPreview
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 预览内容
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/InterpretationCard'

  /ritual/session/{sessionId}/full-read:
    get:
      tags: [ritual]
      summary: 获取完整解读
      operationId: getFullInterpretation
      security:
        - bearerAuth: []
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 完整解读内容
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/InterpretationCard'

  /ritual/session/{sessionId}/continue:
    post:
      tags: [ritual]
      summary: 追问
      operationId: continueRitual
      security:
        - bearerAuth: []
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                message:
                  type: string
                  maxLength: 500
      responses:
        '200':
          description: 追问回复
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/FollowupMessage'

  /ritual/session/{sessionId}/chat-history:
    get:
      tags: [ritual]
      summary: 获取对话历史
      operationId: getChatHistory
      security:
        - bearerAuth: []
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 对话历史
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          messages:
                            type: array
                            items:
                              $ref: '#/components/schemas/FollowupMessage'

  /ritual/session/{sessionId}/interpretation/stream:
    get:
      tags: [ritual]
      summary: SSE 流式解读
      operationId: streamInterpretation
      security:
        - bearerAuth: []
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: SSE 流
          content:
            text/event-stream:
              schema:
                type: string
                description: |
                  事件格式：
                  - `event: chunk\ndata: {"delta":"..."}\n\n`
                  - `event: done\ndata: {"sessionId":"..."}\n\n`
                  - `event: error\ndata: {"code":"...","message":"..."}\n\n`

  /ritual/session/{sessionId}/followup/stream:
    get:
      tags: [ritual]
      summary: SSE 流式追问回复
      operationId: streamFollowup
      security:
        - bearerAuth: []
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
        - name: messageId
          in: query
          schema:
            type: string
      responses:
        '200':
          description: SSE 流
          content:
            text/event-stream:
              schema:
                type: string

  /ritual/user/{userId}/completion-today:
    get:
      tags: [ritual]
      summary: 获取今日完成状态
      operationId: getCompletionToday
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 今日完成状态
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          completed:
                            type: boolean
                          dateKey:
                            type: string

  /ritual/session/{sessionId}/calibration:
    post:
      tags: [ritual]
      summary: 提交情绪校准反馈
      operationId: calibrateRitualEmotion
      security:
        - bearerAuth: []
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                feedback:
                  type: string
                  enum: [resonated, neutral, not_resonated]
                customText:
                  type: string
                  maxLength: 500
      responses:
        '200':
          description: 校准反馈已保存
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /ritual/me/periodic-review:
    get:
      tags: [ritual]
      summary: 获取周期回顾
      operationId: getPeriodicRitualReview
      security:
        - bearerAuth: []
      parameters:
        - name: days
          in: query
          schema:
            type: integer
            minimum: 7
            maximum: 365
            default: 30
      responses:
        '200':
          description: 周期回顾
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
