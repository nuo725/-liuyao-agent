version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: zhouyi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: zhouyi
      POSTGRES_USER: zhouyi
      POSTGRES_PASSWORD: zhouyi_dev_password
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U zhouyi -d zhouyi']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
